# LLM pricing table.
#
# Keyed by [provider."model"]. Values are USD per 1,000,000 tokens and are
# stored as STRINGS so they parse directly into Decimal (never float).
#
# Update these to match each provider's current published pricing.

[anthropic."claude-sonnet-4-5"]
input_per_million_usd = "3.00"
output_per_million_usd = "15.00"

[anthropic."claude-opus-4-1"]
input_per_million_usd = "15.00"
output_per_million_usd = "75.00"

[anthropic."claude-haiku-4-5"]
input_per_million_usd = "1.00"
output_per_million_usd = "5.00"

[anthropic."claude-3-5-haiku-latest"]
input_per_million_usd = "0.80"
output_per_million_usd = "4.00"

[openai."gpt-4o"]
input_per_million_usd = "2.50"
output_per_million_usd = "10.00"

[openai."gpt-4o-mini"]
input_per_million_usd = "0.15"
output_per_million_usd = "0.60"

[openai."o3-mini"]
input_per_million_usd = "1.10"
output_per_million_usd = "4.40"

# OpenRouter uses "vendor/model" slugs. These are a convenience cache; when a
# model is missing here the provider falls back to the cost OpenRouter returns.
[openrouter."anthropic/claude-sonnet-4.5"]
input_per_million_usd = "3.00"
output_per_million_usd = "15.00"

[openrouter."openai/gpt-4o"]
input_per_million_usd = "2.50"
output_per_million_usd = "10.00"

[openrouter."google/gemini-2.5-flash"]
input_per_million_usd = "0.30"
output_per_million_usd = "2.50"

[openrouter."meta-llama/llama-3.3-70b-instruct"]
input_per_million_usd = "0.12"
output_per_million_usd = "0.30"
