<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SyncFlow{% endblock %}</title>
    <style>
        :root {
            --bg: #05060a;
            --bg-soft: #0b0e16;
            --panel: rgba(18, 22, 34, 0.72);
            --panel-border: rgba(120, 140, 200, 0.16);
            --text: #e7ecf5;
            --muted: #8b94ad;
            --accent: #6366f1;
            --accent-2: #22d3ee;
            --accent-3: #a855f7;
            --good: #34d399;
            --danger: #fb7185;
            --radius: 16px;
            --shadow: 0 20px 60px -25px rgba(99, 102, 241, 0.55);
        }
        * { box-sizing: border-box; }
        html, body { margin: 0; padding: 0; }
        body {
            font-family: 'Inter', -apple-system, system-ui, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            line-height: 1.6;
        }
        /* Animated aurora + grid backdrop */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: -2;
            background:
                radial-gradient(60% 50% at 15% 10%, rgba(99,102,241,0.22), transparent 60%),
                radial-gradient(50% 50% at 85% 20%, rgba(34,211,238,0.18), transparent 60%),
                radial-gradient(60% 60% at 50% 100%, rgba(168,85,247,0.18), transparent 60%);
            filter: saturate(120%);
        }
        body::after {
            content: '';
            position: fixed; inset: 0; z-index: -1;
            background-image:
                linear-gradient(rgba(120,140,200,0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(120,140,200,0.05) 1px, transparent 1px);
            background-size: 48px 48px;
            mask-image: radial-gradient(ellipse 100% 80% at 50% 0%, #000 40%, transparent 100%);
        }
        a { color: inherit; text-decoration: none; }
        .container { max-width: 1120px; margin: 0 auto; padding: 0 1.5rem; }

        /* Nav */
        nav.topbar {
            position: sticky; top: 0; z-index: 50;
            backdrop-filter: blur(14px);
            background: rgba(5, 6, 10, 0.6);
            border-bottom: 1px solid var(--panel-border);
        }
        .nav-inner { display: flex; align-items: center; justify-content: space-between; height: 64px; }
        .brand { display: flex; align-items: center; gap: 0.6rem; font-weight: 700; font-size: 1.15rem; letter-spacing: -0.02em; }
        .brand .logo {
            width: 28px; height: 28px; border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            box-shadow: 0 0 18px rgba(99,102,241,0.7);
        }
        .nav-links { display: flex; gap: 1.5rem; align-items: center; }
        .nav-links a { color: var(--muted); font-size: 0.92rem; transition: color .2s; }
        .nav-links a:hover { color: var(--text); }
        .btn {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.6rem 1.15rem; border-radius: 999px; font-weight: 600; font-size: 0.9rem;
            border: 1px solid transparent; cursor: pointer; transition: transform .15s, box-shadow .2s, opacity .2s;
        }
        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent-3));
            color: white; box-shadow: var(--shadow);
        }
        .btn-primary:hover { transform: translateY(-1px); }
        .btn-ghost { border-color: var(--panel-border); color: var(--text); background: var(--panel); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .panel {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: var(--radius);
            backdrop-filter: blur(12px);
        }
        .badge {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.35rem 0.8rem; border-radius: 999px; font-size: 0.78rem; font-weight: 600;
            border: 1px solid var(--panel-border); color: var(--accent-2);
            background: rgba(34,211,238,0.08);
        }
        footer.site { border-top: 1px solid var(--panel-border); margin-top: 5rem; padding: 2rem 0; color: var(--muted); font-size: 0.85rem; }
        ::selection { background: rgba(99,102,241,0.4); }
        ::-webkit-scrollbar { width: 10px; height: 10px; }
        ::-webkit-scrollbar-thumb { background: rgba(120,140,200,0.25); border-radius: 999px; }
    </style>
    {% block head_extra %}{% endblock %}
</head>
<body>
    <nav class="topbar">
        <div class="container nav-inner">
            <a href="/" class="brand"><span class="logo"></span> SyncFlow</a>
            <div class="nav-links">
                <a href="/">Home</a>
                <a href="/playground/">Playground</a>
                <a href="/graphql/">GraphQL</a>
                <a href="/admin/">Admin</a>
                <a href="/playground/" class="btn btn-primary">Launch ✦</a>
            </div>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="site">
        <div class="container">
            SyncFlow — real-time collaboration & multi-provider LLMs.
        </div>
    </footer>
    {% block body_extra %}{% endblock %}
</body>
</html>
