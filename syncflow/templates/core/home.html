<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SyncFlow</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; max-width: 900px; margin: 3rem auto; padding: 0 1.5rem; color: #1f2937; }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .lead { color: #6b7280; font-size: 1.15rem; margin-bottom: 2.5rem; }
        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 1.25rem; }
        .feature { padding: 1.25rem; border: 1px solid #e5e7eb; border-radius: 8px; }
        .feature h3 { margin: 0 0 0.5rem; font-size: 1.05rem; }
        .feature p { margin: 0; color: #4b5563; font-size: 0.95rem; }
        .links { margin-top: 2.5rem; display: flex; gap: 1rem; }
        .links a { color: #2563eb; text-decoration: none; font-weight: 500; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>SyncFlow</h1>
    <p class="lead">Real-time collaborative project management.</p>

    <div class="features">
        {% for feature in features %}
        <div class="feature">
            <h3>{{ feature.title }}</h3>
            <p>{{ feature.description }}</p>
        </div>
        {% endfor %}
    </div>

    <div class="links">
        <a href="/admin/">Admin</a>
        <a href="/graphql/">GraphQL</a>
        <a href="/dashboard/">Dashboard</a>
    </div>
</body>
</html>
